# =============================================================
# Ly config.ini — tema Catppuccin Macchiato
# Ajustado para setup minimalista i3wm + Alacritty + Zed
# Baseado no config.ini oficial (fairyglade/ly), apenas com os
# valores de cor/layout/animação alterados. O resto ficou no
# padrão de fábrica.
# =============================================================

# Ly supports 24-bit true color with styling, which means each color is a 32-bit value.
# The format is 0xSSRRGGBB, where SS is the styling, RR is red, GG is green, and BB is blue.
# Here are the possible styling options:
# TB_BOLD 0x01000000
# TB_UNDERLINE 0x02000000
# TB_REVERSE 0x04000000
# TB_ITALIC 0x08000000
# TB_BLINK 0x10000000
# TB_HI_BLACK 0x20000000
# TB_BRIGHT 0x40000000
# TB_DIM 0x80000000
# Programmatically, you'd apply them using the bitwise OR operator (|), but because Ly's
# configuration doesn't support using it, you have to manually compute the color value.
# Note that, if you want to use the default color value of the terminal, you can use the
# special value 0x00000000. This means that, if you want to use black, you *must* use
# the styling option TB_HI_BLACK (the RGB values are ignored when using this option).

# Allow empty password or not when authenticating
allow_empty_password = true

# --- ANIMAÇÃO ---
# none -> Nothing
# doom -> PSX DOOM fire
# matrix -> CMatrix
# colormix -> Color mixing shader
# gameoflife -> John Conway's Game of Life
# dur_file -> .dur file format (https://github.com/cmang/durdraw/tree/master)
#
# Usando colormix por padrão: leve, nativo (sem dependências externas) e
# combina bem com a paleta Macchiato (mauve + blue se misturando sobre o crust).
# Quando você tiver um .dur pronto (ex: um logo do Arch ou algo em ASCII art),
# troque para "dur_file" e aponte dur_file_path pra ele.
animation = colormix

# Delay between each animation frame in milliseconds
animation_frame_delay = 5

# Stop the animation after some time
# 0 -> Run forever
# 1..2e12 -> Stop the animation after this many seconds
animation_timeout_sec = 0

# The character used to mask the password
# Bullet point (•) em vez de asterisco, fica mais discreto
asterisk = 0x2022

# The number of failed authentications before a special animation is played... ;)
# If set to 0, the animation will never be played
auth_fails = 10

# Identifier for battery whose charge to display at top left
battery_id = null

# --- AUTOLOGIN (desativado por padrão, ajuste se quiser) ---
auto_login_service = ly-autologin
auto_login_session = null
auto_login_user = null

# Background color id (fundo da caixa/menu) — Surface 0 do Macchiato
bg = 0x00363a4f

# Big clock (mantendo desligado pra ficar minimalista)
bigclock = none
bigclock_12hr = false
bigclock_seconds = false

# Blank main box background — true = sólido com a cor `bg`
blank_box = true

# Border foreground color id — Mauve do Macchiato, dá o toque de cor
border_fg = 0x00c6a0f6

# Posição da caixa (0.0 a 1.0)
box_position_h = 0.5
box_position_v = 0.45

# Título customizado no topo da caixa
box_title = arch // i3

# Brightness keys (padrão, ajuste se seu setup usa outra ferramenta)
brightness_down_cmd = $PREFIX_DIRECTORY/bin/brightnessctl -q -n s 10%-
brightness_down_key = F5
brightness_up_cmd = $PREFIX_DIRECTORY/bin/brightnessctl -q -n s +10%
brightness_up_key = F6

# Erase password input on failure
clear_password = false

# Relógio no canto superior direito, formato 24h enxuto
clock = %H:%M

# --- CMATRIX (caso troque animation = matrix) ---
# Verde do Macchiato pro efeito Matrix ficar no tema
cmatrix_fg = 0x00a6da95
cmatrix_head_col = 0x00cad3f5
cmatrix_min_codepoint = 0x21
cmatrix_max_codepoint = 0x7B

# --- COLORMIX (animação ativa) ---
# Mistura Mauve + Blue sobre o Crust do Macchiato
colormix_col1 = 0x00c6a0f6
colormix_col2 = 0x008aadf4
colormix_col3 = 0x00181926

# For custom binds: the horizontal limit in characters for each line
custom_bind_width = null

# Custom sessions directory
custom_sessions = $CONFIG_DIRECTORY/ly/custom-sessions

# Input box active by default on startup
default_input = login

# --- DOOM (caso troque animation = doom) ---
doom_fire_height = 6
doom_fire_spread = 2
# Peach / Yellow / Text do Macchiato dão um fogo mais "quente pastel"
doom_top_color = 0x00ed8796
doom_middle_color = 0x00f5a97f
doom_bottom_color = 0x00eed49f

# --- DUR FILE (caso troque animation = dur_file) ---
# Aponte pra um arquivo .dur seu (feito com durdraw ou baixado)
dur_file_path = $CONFIG_DIRECTORY/ly/example.dur
dur_offset_alignment = center
dur_x_offset = 0
dur_y_offset = 0

# Margem das bordas da tela (útil em monitor curvo)
edge_margin = 0

# Error colors — mesmo bg da caixa, texto em Red (Macchiato) e negrito
error_bg = 0x00363a4f
error_fg = 0x01ed8796

# Foreground color id (texto) — Text do Macchiato
fg = 0x00cad3f5

# Render true colors (mantenha true, Alacritty suporta 24-bit)
full_color = true

# --- GAME OF LIFE (caso troque animation = gameoflife) ---
gameoflife_entropy_interval = 10
# Verde do Macchiato
gameoflife_fg = 0x00a6da95
gameoflife_frame_delay = 6
gameoflife_initial_density = 0.4

# Hibernate
hibernate_cmd = null
hibernate_key = F4

# --- LIMPEZA VISUAL (minimalismo) ---
hide_borders = false
hide_key_hints = false
hide_keyboard_locks = true
hide_version_string = true

# Inactivity
inactivity_cmd = null
inactivity_delay = 0

# Info line (deixe null pra mostrar o hostname)
initial_info_text = null

# Input boxes length
input_len = 30

# Active language
lang = en

# Login/logout hooks
login_cmd = null
login_defs_path = /etc/login.defs
logout_cmd = null

# Log file
ly_log = /var/log/ly.log

# Margens internas da caixa
margin_box_h = 3
margin_box_v = 1

# Numlock
numlock = false

# Path
path = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

# Restart
restart_cmd = /sbin/shutdown -r now
restart_key = F2

# Save last session/user usados
save = true

# Service name
service_name = ly

# Session log
session_log = .local/state/ly-session.log

# Setup command
setup_cmd = $CONFIG_DIRECTORY/ly/setup.sh

# Mostra sessão "shell" na lista
shell = true

# Show password key
show_password_key = F7

# TTY ativa no canto (mantendo desligado, minimalista)
show_tty = false

# Shutdown
shutdown_cmd = /sbin/shutdown $PLATFORM_SHUTDOWN_ARG now
shutdown_key = F1

# Sleep
sleep_cmd = null
sleep_key = F3

# Start hook
start_cmd = $CONFIG_DIRECTORY/ly/startup.sh

# Centraliza o nome da sessão embaixo do usuário
text_in_center = true

# Vi keybindings (ative se curtir navegar com hjkl)
vi_default_mode = normal
vi_mode = false

# Wayland sessions
waylandsessions = $PREFIX_DIRECTORY/share/wayland-sessions

# Xorg
x_cmd = $PREFIX_DIRECTORY/bin/X
x_vt = null
xauth_cmd = $PREFIX_DIRECTORY/bin/xauth
xinitrc = ~/.xinitrc
xsessions = $PREFIX_DIRECTORY/share/xsessions

# =============================================================
# Custom Commands and Labels (opcional)
# Descomente e ajuste se quiser atalhos/labels extras na tela
# =============================================================
#[cmd:F8]
#cmd = touch /tmp/ly.gaming
#name = custom command $brightness_up

#[lbl:kernel]
#cmd = uname -srn
#refresh = 0
