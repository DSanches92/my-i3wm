# ============================================================
# Janela
# ============================================================
[window]
padding = { x = 8, y = 8 }
dynamic_padding = false
decorations = "Full"
opacity = 1.0
startup_mode = "Windowed"
title = "Alacritty — Arch"
dynamic_title = true

# ============================================================
# Scrollback
# ============================================================
[scrolling]
history = 10000
multiplier = 5

# ============================================================
# Fonte
# ============================================================
[font]
normal = { family = "GeistMono Nerd Font Mono", style = "Regular" }
bold   = { family = "GeistMono Nerd Font Mono", style = "Bold" }
italic = { family = "GeistMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "GeistMono Nerd Font Mono", style = "Bold Italic" }
size = 10.0
offset = { x = 0, y = 1 }
builtin_box_drawing = true

# ============================================================
# Cursor
# ============================================================
[cursor]
style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 600
blink_timeout = 0   # 0 = nunca para de piscar
unfocused_hollow = true
thickness = 0.15

# ============================================================
# Cores — Catppuccin Mocha (oficial)
# https://github.com/catppuccin/alacritty
# ============================================================
[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors = true

[colors.primary]
background     = "#1e1e2e"
foreground     = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text   = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text       = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#f5e0dc"

# ============================================================
# Mouse
# ============================================================
[mouse]
hide_when_typing = true

# ============================================================
# Seleção
# ============================================================
[selection]
save_to_clipboard = false

# ============================================================
# Hints — abre URLs com Ctrl+Shift+O
# ============================================================
[[hints.enabled]]
hyperlinks      = true
post_processing = true
persist         = false
command         = { program = "cmd", args = ["/c", "start", ""] }
mouse.enabled   = true
binding         = { key = "O", mods = "Control|Shift" }
regex = "(https?://|ftp://|mailto:|ssh:|git://|gemini://|gopher://)[^\\s<>\"'()]+"

# ============================================================
# Teclado — atalhos extras
# ============================================================
[keyboard]
bindings = [
  # Nova janela
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },

  # Zoom de fonte
  { key = "=",     mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",  mods = "Control", action = "ResetFontSize" },

  # Scroll por teclado
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Home",     mods = "Shift", action = "ScrollToTop"    },
  { key = "End",      mods = "Shift", action = "ScrollToBottom" },

  # Vi mode
  { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },
]
